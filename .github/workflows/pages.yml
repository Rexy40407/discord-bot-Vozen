name: Deploy site to GitHub Pages

# Publica a pasta site/ como um site estatico em GitHub Pages.
# O passo configure-pages (enablement: true) LIGA o Pages sozinho na 1a corrida,
# por isso nao e preciso mexer em Settings -> Pages. Cada push a main que altere
# site/ redeploya automaticamente.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma so publicacao de cada vez; nao cancela um deploy a meio.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

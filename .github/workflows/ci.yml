name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22.x = piso real (o @discordjs/voice exige >=22.12; o VPS corre 22).
        # 24.x = cobertura forward (a máquina de dev corre 24). O 20.x saiu:
        # era um alvo que a dependência core já não suporta (EBADENGINE).
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # `npm ci` runs install scripts normally: the `allowScripts` key in
      # package.json is inert here (no @lavamoat/allow-scripts installed, no
      # .npmrc ignore-scripts), so native deps (better-sqlite3, @discordjs/opus,
      # sodium-native) build/fetch prebuilds on ubuntu for Node 22/24.
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npx vitest run
